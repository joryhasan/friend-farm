<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>واجهة مزارع الأصدقاء المحدثة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; text-align: center; padding: 50px; }
        .btn { background-color: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .btn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <h2>مرحباً بك في واجهة التحديث السحابي المستقلة</h2>
    <p>اضغط على الزر أدناه لبدء إرسال وحفظ بيانات المزارع الـ 300 سحابياً</p>
    <button class="btn" onclick="startUpdate()">تحديث وحفظ المزارع الآن</button>

    <script>
        function startUpdate() {
            // الاتصال المباشر والآمن بالسيرفر الجديد بالرابط الكامل الصحيح
            fetch('https://site.je', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "update_farms", list: "300_farms" })
            })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            })
            .then(data => alert("🥳 تم الحفظ والتحديث السحابي بنجاح تام!"))
            .catch(err => alert("❌ خطأ في الاتصال بالسيرفر، تأكد من تفعيل الاستضافة"));
        }
    </script>
</body>
</html>
